name: release

# Build the .deb + AppImage and attach them to the GitHub Release whenever a
# version tag (v1.2.3) is pushed.
on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build .deb
        run: bash packaging/deb/build.sh

      - name: Build AppImage
        continue-on-error: true        # a .deb release still ships if this hiccups
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1" # appimagetool without FUSE on CI
        run: |
          curl -fsSL -o /usr/local/bin/appimagetool \
            https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x /usr/local/bin/appimagetool
          bash packaging/appimage/build.sh

      - name: Attach artifacts to the Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.deb
            dist/*.AppImage
          generate_release_notes: true
          fail_on_unmatched_files: false
